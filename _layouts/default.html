<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
      --card-bg: #ffffff;
      --section-bg: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --border: #374151;
        --card-bg: #1f2937;
        --section-bg: #1f2937;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 17px;
    }
    .container { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 a { color: var(--text); text-decoration: none; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    nav { margin-top: 0.5rem; }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1rem;
      font-size: 0.9rem;
    }
    nav a:hover { text-decoration: underline; }
    a { color: var(--accent); }
    .post-list { list-style: none; }
    .post-list li {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list .date { color: var(--muted); font-size: 0.85rem; }
    .post-list h2 { font-size: 1.15rem; margin: 0.25rem 0; }
    .post-list h2 a { color: var(--text); text-decoration: none; }
    .post-list h2 a:hover { color: var(--accent); }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}">Archive</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      Curated daily by Claude &middot; Powered by GitHub Pages
    </footer>
  </div>
</body>
</html>
