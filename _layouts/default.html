<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
      --card-bg: #ffffff;
      --section-bg: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --border: #374151;
        --card-bg: #1f2937;
        --section-bg: #1f2937;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 17px;
    }
    .container { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
    header {
      border-bottom: 2px solid var(--accent);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 a { color: var(--text); text-decoration: none; }
    header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    nav { margin-top: 0.5rem; }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1rem;
      font-size: 0.9rem;
    }
    nav a:hover { text-decoration: underline; }
    a { color: var(--accent); }
    .post-list { list-style: none; }
    .post-list li {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list .date { color: var(--muted); font-size: 0.85rem; }
    .post-list h2 { font-size: 1.15rem; margin: 0.25rem 0; }
    .post-list h2 a { color: var(--text); text-decoration: none; }
    .post-list h2 a:hover { color: var(--accent); }
    .subscribe-panel {
      background: var(--section-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1.5rem 0 2rem;
    }
    .subscribe-panel h2 {
      font-size: 1.15rem;
      line-height: 1.35;
      margin-bottom: 0.35rem;
    }
    .subscribe-panel p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .subscribe-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.65rem;
      align-items: center;
    }
    .subscribe-form input[type="email"] {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      line-height: 1.4;
      padding: 0.7rem 0.8rem;
    }
    .subscribe-form button,
    .subscribe-button,
    .subscribe-disabled {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      padding: 0.7rem 0.95rem;
      white-space: nowrap;
    }
    .subscribe-button {
      display: inline-block;
      text-align: center;
      text-decoration: none;
    }
    .subscribe-disabled {
      display: inline-block;
      cursor: default;
      opacity: 0.65;
    }
    .subscribe-note {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 0.75rem;
    }
    .subscribe-note a { color: var(--accent); }
    @media (max-width: 520px) {
      .subscribe-form { grid-template-columns: 1fr; }
      .subscribe-form button,
      .subscribe-disabled { width: 100%; }
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ '/briefing/' | relative_url }}">Latest</a>
        <a href="{{ '/' | relative_url }}">Past Briefings</a>
        <a href="{{ '/subscribe/' | relative_url }}">Subscribe</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      Curated daily by Claude &middot; Powered by GitHub Pages
    </footer>
  </div>
</body>
</html>
