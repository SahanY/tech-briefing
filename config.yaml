curation:
  max_articles_per_source: 3
  lookback_hours: 24
  monday_lookback_hours: 72
  monday_include_weekend_news: true
  max_email_words: 2000
  max_articles_to_claude: 40
  model: claude-sonnet-4-6
  temperature: 0.3

ranking:
  high_signal_keywords:
    - acquisition
    - acquired
    - funding
    - series a
    - series b
    - series c
    - series d
    - ipo
    - launch
    - launched
    - billion
    - million
    - partnership
    - merger
    - layoff
    - startup
    - valuation
    - regulation
    - antitrust
    - breakthrough
    - open source

  category_priority:
    top_stories: 2
    enterprise_software: 1
    vc_fundraising: 1
    tech_investing: 1
    ai_emerging_tech: 1
    hot_takes: 0
    quick_hits: 0
