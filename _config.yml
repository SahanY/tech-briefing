title: Tech Briefing
description: Daily curated tech news — enterprise software, VC, AI, and markets
url: "https://sahany.github.io"
baseurl: "/tech-briefing"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - README.md
  - setup.py
  - AGENTS.md
  - CLAUDE.md
  - config.yaml
  - Gemfile
  - Gemfile.lock
  - scripts
  - .env
  - github-pages-site
  - jekyll-serve.log
  - jekyll-serve.err.log

# Market movers
stock_movers:
  count: 15
  data_file: "_data/stock_movers.json"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:year/:month/:day/

# Feed
feed:
  path: feed.xml

# Email subscriptions
# Use beehiiv_url for a hosted signup page, or form_action for a direct form endpoint.
subscription:
  beehiiv_url: "https://sahans-tech-briefing.beehiiv.com/"
  form_action: ""
  form_method: "post"
