title: Tech Briefing
description: Daily curated tech news — enterprise software, VC, AI, and markets
url: "https://sahany.github.io"
baseurl: "/tech-briefing"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - README.md
  - setup.py
  - .env
  - github-pages-site

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:year/:month/:day/

# Feed
feed:
  path: feed.xml
