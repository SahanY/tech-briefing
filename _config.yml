layout: post
title: Tech Briefing
description: Daily curated tech news — enterprise software, VC, AI, and markets
url: "" # Will be set to your GitHub Pages URL
baseurl: ""

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - README.md
  - setup.py
  - .env

# Pagination (if you add jekyll-paginate later)
# paginate: 10
# paginate_path: "/page:num/"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /briefing/

# Feed
feed:
  path: feed.xml
