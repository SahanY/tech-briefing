title: Tech Briefing
description: Daily curated tech news — enterprise software, VC, AI, and markets
url: "https://sahany.github.io"
baseurl: "/tech-briefing"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - README.md
  - setup.py
  - .env
  - github-pages-site

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:year/:month/:day/

# Feed
feed:
  path: feed.xml

# Email subscriptions
# Set form_action to your newsletter/form provider endpoint, for example:
# https://formspree.io/f/your-form-id, https://buttondown.email/your-list, etc.
subscription:
  form_action: ""
  form_method: "post"
